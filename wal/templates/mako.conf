background-color={background}
text-color={foreground}
markup=1

[urgency=low]
border-color={color8}
format=<span foreground="{color8}">•</span> <b>%s</b>\n%b

[urgency=normal]
border-color={color4}
format=<span foreground="{color4}">●</span> <b>%s</b>\n%b

[urgency=high]
border-color={color1}
format=<span foreground="{color1}">⚠</span> <b>%s</b>\n%b
default-timeout=0
