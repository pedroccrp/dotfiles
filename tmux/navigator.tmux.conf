is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\S+/)?(n?vim|view)$'"
is_ssh="ps -o comm= -t '#{pane_tty}' | grep -iq ssh"

bind -n C-h if-shell "$is_ssh" "send-keys C-h" "if-shell \"$is_vim\" \"send-keys C-h\" \"select-pane -L\""
bind -n C-j if-shell "$is_ssh" "send-keys C-j" "if-shell \"$is_vim\" \"send-keys C-j\" \"select-pane -D\""
bind -n C-k if-shell "$is_ssh" "send-keys C-k" "if-shell \"$is_vim\" \"send-keys C-k\" \"select-pane -U\""
bind -n C-l if-shell "$is_ssh" "send-keys C-l" "if-shell \"$is_vim\" \"send-keys C-l\" \"select-pane -R\""

bind C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
