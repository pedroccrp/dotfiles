session_name: Digitalize API
start_directory: $HOME/oxeanbits/digitalize-api
windows:
  - window_name: Editor
    window_index: 1
    panes:
      - nvim
  - window_name: Codex
    window_index: 2
    panes:
      - ~/.asdf/installs/nodejs/24.4.1/bin/codex
  - window_name: Serve/Extra
    window_index: 3
    layout: even-horizontal
    panes:
      - shell_command:
        - docker start mongo1 mongo2 mongo3 ; clear
        - "rails s -b 0.0.0.0"
      - pane
