session_name: Digitalize Front
start_directory: $HOME/oxeanbits/digitalize-front
windows:
  - window_name: Editor
    window_index: 1
    panes:
      - nvim
  - window_name: Codex
    window_index: 2
    panes:
      - ~/.asdf/installs/nodejs/24.4.1/bin/codex
  - window_name: Serve/Extra
    window_index: 3
    layout: even-horizontal
    panes:
      - shell_command:
        - "flutter run -d web-server --web-port 5001"
      - pane
