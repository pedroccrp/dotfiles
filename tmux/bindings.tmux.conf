bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

bind r source-file ~/.tmux.conf

bind -r Up resize-pane -U 5
bind -r Down resize-pane -D 5
bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5

bind -r m resize-pane -Z

bind -T copy-mode-vi v send-keys -X begin-selection

if-shell "uname | grep -q Darwin" \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"'

if-shell "uname | grep -q Darwin" \
    'bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell "sleep .15s" \; send-keys -X copy-pipe-and-cancel "pbcopy"' \
    'bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell "sleep .15s" \; send-keys -X copy-pipe-and-cancel "wl-copy"'

if-shell "uname | grep -q Darwin" \
    'bind -n DoubleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-word \; run-shell "sleep .15s" \; send-keys -X copy-pipe-and-cancel "pbcopy"' \
    'bind -n DoubleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-word \; run-shell "sleep .15s" \; send-keys -X copy-pipe-and-cancel "wl-copy"'

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse
